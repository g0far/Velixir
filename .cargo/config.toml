# Host build-scripts / proc-macros compile for the platform-tools msvc host.
# Use LLVM's lld-link (shipped with Solana platform-tools) so we don't need the
# full MSVC toolchain; the MSVC CRT + Windows SDK import libs come from xwin
# (see the LIB env exported at build time).
[target.x86_64-pc-windows-msvc]
linker = "lld-link.exe"
